name: native_workmanager_gen
version: 1.3.3
description: >
  Code generator for native_workmanager.
  Generates type-safe DartWorker callback IDs and worker registry from
  @WorkerCallback annotations.
repository: https://github.com/brewkits/native_workmanager
homepage: https://github.com/brewkits/native_workmanager/tree/main/native_workmanager_gen

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  # Code generation infrastructure
  build: '>=4.0.0 <5.0.0'
  source_gen: '>=4.0.0 <5.0.0'
  analyzer: '>=10.0.0 <14.0.0'

dev_dependencies:
  build_runner: '>=2.4.0 <4.0.0'
  build_test: '>=3.5.0 <4.0.0'
  test: '>=1.24.0 <2.0.0'
  lints: '>=4.0.0 <7.0.0'
  # Deliberately NOT a path dependency on native_workmanager: it's a Flutter
  # package, and depending on it here would pull in the Flutter SDK's pinned
  # `meta` version, which forces `analyzer` down to a version older than the
  # one this generator's code targets (see worker_callback_generator.dart's
  # TopLevelFunctionElement usage, an analyzer 12.x API) — verified this
  # breaks constant-value resolution of the annotation in tests. Tests
  # define a structurally-identical `@WorkerCallback` class inline instead.
